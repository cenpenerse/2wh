<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 0초 후에 index.do 컨트롤러 매핑 주소로 자동으로 리다이렉트합니다. -->
    <meta http-equiv="refresh" content="0; url=index.do">
    <title>Baren - Redirecting...</title>
    <script>
        // JS를 사용하여 브라우저 히스토리를 덮어쓰며 안전하게 리다이렉트합니다.
        window.location.replace("index.do");
    </script>
</head>
<body>
    <p>페이지를 이동 중입니다. 자동으로 이동하지 않으면 <a href="index.do">여기</a>를 클릭하세요.</p>
</body>
</html>
